services:
  dofbot_ros:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        FROM_IMAGE: ${FROM_IMAGE:-ros:jazzy-ros-base}
        OVERLAY_WS: /opt/ros/overlay_ws
    container_name: dofbot_ros
    network_mode: host
    restart: unless-stopped
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
      ENABLE_FACE_DETECTION: ${ENABLE_FACE_DETECTION:-1}
      ENABLE_FACE_MESH: ${ENABLE_FACE_MESH:-0}
      ENABLE_POSE: ${ENABLE_POSE:-0}
      DOFBOT_CAMERA_DEVICE: ${DOFBOT_CAMERA_DEVICE:-0}
      DOFBOT_CAMERA_WIDTH: ${DOFBOT_CAMERA_WIDTH:-640}
      DOFBOT_CAMERA_HEIGHT: ${DOFBOT_CAMERA_HEIGHT:-480}
      DOFBOT_CAMERA_FPS: ${DOFBOT_CAMERA_FPS:-15}
      DOFBOT_ARM_LIB_DIR: ${DOFBOT_ARM_LIB_DIR:-/opt/ros/overlay_ws/third_party/Arm_Lib}
    devices:
      - ${DOFBOT_SERIAL_DEVICE:-/dev/ttyUSB0}:${DOFBOT_SERIAL_DEVICE:-/dev/ttyUSB0}
      - ${DOFBOT_CAMERA_DEVICE:-/dev/video0}:${DOFBOT_CAMERA_DEVICE:-/dev/video0}
    volumes:
      - ../docker_data/log:/opt/ros/overlay_ws/runtime_log
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
