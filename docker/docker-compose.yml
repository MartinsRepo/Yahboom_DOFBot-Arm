services:
  dofbot_ros:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        FROM_IMAGE: ${FROM_IMAGE:-ros:jazzy-ros-base}
        OVERLAY_WS: /opt/ros/overlay_ws
    container_name: dofbot_ros
    network_mode: host
    restart: unless-stopped
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
      ENABLE_FACE_DETECTION: ${ENABLE_FACE_DETECTION:-1}
      ENABLE_FACE_MESH: ${ENABLE_FACE_MESH:-0}
      ENABLE_POSE: ${ENABLE_POSE:-0}
      ENABLE_SPEECH_CONTROLLER: ${ENABLE_SPEECH_CONTROLLER:-0}
      ENABLE_LLM_CONTROLLER: ${ENABLE_LLM_CONTROLLER:-0}
      DOFBOT_CONTROL_MODE: ${DOFBOT_CONTROL_MODE:-GUI}
      DOFBOT_STRICT_SAFETY: ${DOFBOT_STRICT_SAFETY:-1}
      DOFBOT_COMMAND_RATE_LIMIT_HZ: ${DOFBOT_COMMAND_RATE_LIMIT_HZ:-8.0}
      DOFBOT_LLM_STALE_TIMEOUT_S: ${DOFBOT_LLM_STALE_TIMEOUT_S:-2.0}
      DOFBOT_MANUAL_OVERRIDE_WINDOW_S: ${DOFBOT_MANUAL_OVERRIDE_WINDOW_S:-1.5}
      DOFBOT_LLM_CONFIG_PATH: ${DOFBOT_LLM_CONFIG_PATH:-/opt/ros/overlay_ws/config/llm_controller.json}
      DOFBOT_LLM_PROVIDER: ${DOFBOT_LLM_PROVIDER:-ollama}
      DOFBOT_LLM_ENDPOINT: ${DOFBOT_LLM_ENDPOINT:-}
      DOFBOT_LLM_API_TOKEN: ${DOFBOT_LLM_API_TOKEN:-}
      DOFBOT_OLLAMA_BASE_URL: ${DOFBOT_OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      DOFBOT_OLLAMA_MODEL: ${DOFBOT_OLLAMA_MODEL:-llama3.1:8b}
      DOFBOT_LLM_SYSTEM_PROMPT: ${DOFBOT_LLM_SYSTEM_PROMPT:-}
      DOFBOT_LLM_LOOP_PERIOD_S: ${DOFBOT_LLM_LOOP_PERIOD_S:-0.15}
      DOFBOT_LLM_REQUEST_TIMEOUT_S: ${DOFBOT_LLM_REQUEST_TIMEOUT_S:-20.0}
      DOFBOT_LLM_REQUEST_RETRIES: ${DOFBOT_LLM_REQUEST_RETRIES:-3}
      DOFBOT_LLM_RETRY_BACKOFF_S: ${DOFBOT_LLM_RETRY_BACKOFF_S:-1.0}
      DOFBOT_LLM_FALLBACK_ON_ERROR: ${DOFBOT_LLM_FALLBACK_ON_ERROR:-1}
      DOFBOT_VOICE_OUTPUT_ENABLED: ${DOFBOT_VOICE_OUTPUT_ENABLED:-0}
      DOFBOT_VOICE_OUTPUT_VOICE: ${DOFBOT_VOICE_OUTPUT_VOICE:-de}
      DOFBOT_VOSK_MODEL_DIR: ${DOFBOT_VOSK_MODEL_DIR:-/opt/ros/overlay_ws/models/vosk-model-small-de-zamia-0.3}
      DOFBOT_AUDIO_DEVICE: ${DOFBOT_AUDIO_DEVICE:-/dev/snd}
      DOFBOT_SPEECH_DEVICE: ${DOFBOT_SPEECH_DEVICE:-default}
      DOFBOT_SPEECH_SAMPLE_RATE: ${DOFBOT_SPEECH_SAMPLE_RATE:-16000}
      DOFBOT_SPEECH_BLOCKSIZE: ${DOFBOT_SPEECH_BLOCKSIZE:-8000}
      DOFBOT_SPEECH_LANGUAGE: ${DOFBOT_SPEECH_LANGUAGE:-de}
      DOFBOT_SPEECH_TOPIC: ${DOFBOT_SPEECH_TOPIC:-roboarm/speech_input}
      DOFBOT_SPEECH_FLUSH_SILENCE_S: ${DOFBOT_SPEECH_FLUSH_SILENCE_S:-0.8}
      DOFBOT_WAKE_WORD: ${DOFBOT_WAKE_WORD:-martin}
      DOFBOT_WAKE_WORD_TIMEOUT_S: ${DOFBOT_WAKE_WORD_TIMEOUT_S:-4.0}
      DOFBOT_CAMERA_DEVICE: ${DOFBOT_CAMERA_DEVICE:-0}
      DOFBOT_CAMERA_WIDTH: ${DOFBOT_CAMERA_WIDTH:-640}
      DOFBOT_CAMERA_HEIGHT: ${DOFBOT_CAMERA_HEIGHT:-480}
      DOFBOT_CAMERA_FPS: ${DOFBOT_CAMERA_FPS:-15}
      DOFBOT_ARM_LIB_DIR: ${DOFBOT_ARM_LIB_DIR:-/opt/ros/overlay_ws/third_party/Arm_Lib}
    devices:
      - ${DOFBOT_SERIAL_DEVICE:-/dev/ttyUSB0}:${DOFBOT_SERIAL_DEVICE:-/dev/ttyUSB0}
      - ${DOFBOT_CAMERA_DEVICE:-/dev/video0}:${DOFBOT_CAMERA_DEVICE:-/dev/video0}
      - ${DOFBOT_AUDIO_DEVICE:-/dev/snd}:${DOFBOT_AUDIO_DEVICE:-/dev/snd}
    volumes:
      - ../docker_data/log:/opt/ros/overlay_ws/runtime_log
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
